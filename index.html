<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>H5游戏 - 仪表盘示例</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 测试按钮 - 放在最外层 -->
    <div style="position: fixed; top: 10px; left: 10px; z-index: 99999;">
        <button id="test-top" style="padding: 20px; font-size: 20px; margin: 5px; background: #ff0000;">测试上</button>
        <button id="test-middle" style="padding: 20px; font-size: 20px; margin: 5px; background: #00ff00;">测试中</button>
        <button id="test-bottom" style="padding: 20px; font-size: 20px; margin: 5px; background: #0000ff;">测试下</button>
    </div>
    
    <!-- 上中下按钮 - 放在最外层 -->
    <div class="button-container" style="position: fixed; top: 100px; left: 60px; z-index: 99998;">
        <div class="button-item">
            <button class="action-button" id="btn-bottom">下</button>
            <div class="button-text" id="text-bottom"></div>
        </div>
        <div class="button-item">
            <button class="action-button" id="btn-middle">中</button>
            <div class="button-text" id="text-middle"></div>
        </div>
        <div class="button-item">
            <button class="action-button" id="btn-top">上</button>
            <div class="button-text" id="text-top"></div>
        </div>
    </div>
    <button class="clear-button" id="clear-btn" style="position: fixed; top: 20px; left: 20px; z-index: 99999;">清除</button>
    
    <div class="game-container">
        <h1>H5游戏</h1>
        <p>游戏内容区域</p>
        <div class="complete-counter" id="complete-counter">0</div>
        <div class="dashboard">
            <div class="dashboard-value">0</div>
        </div>
        <div class="touch-info">触摸位置: (0, 0)</div>
        <div class="touch-area"></div>
        <div class="touch-area-top"></div>
        <div class="touch-area-middle"></div>
        <div class="touch-area-bottom"></div>
        
        <!-- 数据显示区域 -->
        <div class="data-container">
            <div class="data-item">
                <div class="data-label">下</div>
                <div class="data-value" id="data-bottom">0</div>
            </div>
            <div class="data-item">
                <div class="data-label">中</div>
                <div class="data-value" id="data-middle">0</div>
            </div>
            <div class="data-item">
                <div class="data-label">上</div>
                <div class="data-value" id="data-top">0</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
