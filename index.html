<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>H5游戏 - 仪表盘示例</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 上中下按钮 - 放在最外层 -->
    <div class="button-container" style="position: fixed; top: 100px; left: 60px; z-index: 99998;">
        <div class="button-item">
            <button class="action-button" id="btn-bottom">下</button>
            <div class="button-text" id="text-bottom"></div>
        </div>
        <div class="button-item">
            <button class="action-button" id="btn-middle">中</button>
            <div class="button-text" id="text-middle"></div>
        </div>
        <div class="button-item">
            <button class="action-button" id="btn-top">上</button>
            <div class="button-text" id="text-top"></div>
        </div>
    </div>
    <button class="clear-button" id="clear-btn" style="position: fixed; top: 20px; left: 20px; z-index: 99999;">清除</button>
    <button class="clear-button" id="reset-record-btn" style="position: fixed; top: 180px; left: 20px; z-index: 99999; background: #ff6600; writing-mode: vertical-rl; text-orientation: upright; padding: 15px 8px; height: auto; width: auto;">重置记录</button>
    
    <!-- 电量条 - 横着的长条 -->
    <div class="battery-bar" style="position: fixed; top: 80px; left: 120px; width: 200px; height: 30px; background: #333; border-radius: 5px; z-index: 99999; overflow: hidden;">
        <!-- 竖杠显示区 -->
        <div class="battery-bars" id="battery-bars" style="display: flex; height: 100%; align-items: center; padding: 0 5px;">
            <!-- 动态生成竖杠 -->
        </div>
    </div>
    
    <div class="game-container">
        <h1>H5游戏</h1>
        <p>游戏内容区域</p>
        <div class="complete-counter" id="complete-counter">0</div>
        <div class="dashboard">
            <div class="dashboard-value">0</div>
        </div>
        <div class="touch-info">触摸位置: (0, 0)</div>
        <div class="touch-area"></div>
        <div class="touch-area-top"></div>
        <div class="touch-area-middle"></div>
        <div class="touch-area-bottom"></div>
        
        <!-- 数据显示区域 -->
        <div class="data-container">
            <div class="data-item">
                <div class="data-label">下</div>
                <div class="data-value" id="data-bottom">0</div>
            </div>
            <div class="data-item">
                <div class="data-label">中</div>
                <div class="data-value" id="data-middle">0</div>
            </div>
            <div class="data-item">
                <div class="data-label">上</div>
                <div class="data-value" id="data-top">0</div>
            </div>
        </div>
        
        <!-- 统计面板 -->
        <div class="stats-container" style="position: fixed; top: 280px; left: 200px; background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 10px; z-index: 99999; font-size: 14px;">
            <div style="margin-bottom: 10px; font-weight: bold; font-size: 16px;">统计信息</div>
            <div>记录次数: <span id="stat-count">0</span></div>
            <div style="margin-top: 10px; border-top: 1px solid #555; padding-top: 10px;">
                <div style="font-weight: bold; margin-bottom: 5px;">上 (平均):</div>
                <div>圆心: (<span id="stat-top-x">0</span>, <span id="stat-top-y">0</span>)</div>
                <div>半径: <span id="stat-top-r">0</span></div>
            </div>
            <div style="margin-top: 10px;">
                <div style="font-weight: bold; margin-bottom: 5px;">中 (平均):</div>
                <div>圆心: (<span id="stat-middle-x">0</span>, <span id="stat-middle-y">0</span>)</div>
                <div>半径: <span id="stat-middle-r">0</span></div>
            </div>
            <div style="margin-top: 10px;">
                <div style="font-weight: bold; margin-bottom: 5px;">下 (平均):</div>
                <div>圆心: (<span id="stat-bottom-x">0</span>, <span id="stat-bottom-y">0</span>)</div>
                <div>半径: <span id="stat-bottom-r">0</span></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
