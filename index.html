<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>仪表盘示例</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 清除按钮已隐藏，使用长按仪表盘重置 -->
    <button class="clear-button" id="clear-btn" style="position: fixed; bottom: 20px; left: 20px; z-index: 99999; width: 30px; height: 30px; padding: 0; font-size: 14px; display: none;">统</button>
    <button class="clear-button" id="reset-record-btn" style="position: fixed; bottom: 55px; left: 20px; z-index: 99999; background: #ff6600; width: 30px; height: 30px; padding: 0; font-size: 14px; display: none;">记</button>
    

    
    <div class="game-container">
        <div class="complete-counter" id="complete-counter">0</div>
        <div class="dashboard">
            <div class="dashboard-value">0</div>
        </div>
        
        <!-- 记分显示 -->
        <div class="score-display" id="score-display">
            <div class="level-display" id="level-display">
                <span class="level-label">等级</span>
                <span class="level-value" id="level-value">1</span>
            </div>
            <div class="score-row">
                <span class="score-label">得分</span>
                <span class="score-value" id="score-value">0</span>
            </div>
            <div class="success-rate-row">
                <span class="success-rate-label">成功率</span>
                <span class="success-rate-value" id="success-rate-value">100%</span>
            </div>
        </div>
        
        <!-- 等级选择面板 -->
        <div class="level-select-panel" id="level-select-panel" style="display: none;">
            <div class="panel-title">选择等级</div>
            <div class="level-grid" id="level-grid"></div>
        </div>
        
        <!-- 挑战失败提示 -->
        <div class="challenge-fail-modal" id="challenge-fail-modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-title">挑战失败</div>
                <div class="modal-message">本局未达标，要重新挑战吗？</div>
                <div class="modal-buttons">
                    <button class="modal-btn retry-btn" id="retry-btn">重新挑战</button>
                </div>
            </div>
        </div>
        
        <!-- 升级成功提示 -->
        <div class="level-up-modal" id="level-up-modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-title level-up-title">🎉 升级成功！</div>
                <div class="modal-message" id="level-up-message">解锁下一级</div>
                <div class="modal-buttons">
                    <button class="modal-btn continue-btn" id="continue-btn">继续</button>
                </div>
            </div>
        </div>
        
        <div class="touch-info" style="display: none;">触摸位置: (0, 0)</div>
        <div class="touch-area"></div>
        <div class="touch-area-top"></div>
        <div class="touch-area-middle"></div>
        <div class="touch-area-bottom"></div>
        
        <!-- 可随页面动的正方形框 -->
        <div class="dynamic-frame" id="dynamic-frame">
            <!-- 40像素的球 -->
            <div class="control-ball" id="control-ball">
                <!-- 四方向箭头 -->
                <div class="arrow arrow-up" id="arrow-up"></div>
                <div class="arrow arrow-down" id="arrow-down"></div>
                <div class="arrow arrow-left" id="arrow-left"></div>
                <div class="arrow arrow-right" id="arrow-right"></div>
            </div>
        </div>
        
        <!-- 数据显示区域 -->
        <div class="data-container" style="display: none;">
            <div class="data-item">
                <div class="data-label">下</div>
                <div class="data-value" id="data-bottom">0</div>
            </div>
            <div class="data-item">
                <div class="data-label">中</div>
                <div class="data-value" id="data-middle">0</div>
            </div>
            <div class="data-item">
                <div class="data-label">上</div>
                <div class="data-value" id="data-top">0</div>
            </div>
        </div>
        
        <!-- 统计面板 -->
        <div class="stats-container" style="position: fixed; bottom: 90px; left: 20px; background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 10px; z-index: 99999; font-size: 14px; display: none;">
            <div style="margin-bottom: 10px; font-weight: bold; font-size: 16px;">统计信息</div>
            <div>记录次数: <span id="stat-count">0</span></div>
            <div style="margin-top: 10px; border-top: 1px solid #555; padding-top: 10px;">
                <div style="font-weight: bold; margin-bottom: 5px;">上 (平均):</div>
                <div>圆心: (<span id="stat-top-x">0</span>, <span id="stat-top-y">0</span>)</div>
                <div>半径: <span id="stat-top-r">0</span></div>
            </div>
            <div style="margin-top: 10px;">
                <div style="font-weight: bold; margin-bottom: 5px;">中 (平均):</div>
                <div>圆心: (<span id="stat-middle-x">0</span>, <span id="stat-middle-y">0</span>)</div>
                <div>半径: <span id="stat-middle-r">0</span></div>
            </div>
            <div style="margin-top: 10px;">
                <div style="font-weight: bold; margin-bottom: 5px;">下 (平均):</div>
                <div>圆心: (<span id="stat-bottom-x">0</span>, <span id="stat-bottom-y">0</span>)</div>
                <div>半径: <span id="stat-bottom-r">0</span></div>
            </div>
        </div>
    </div>
    <script src="script.js?v=18"></script>
</body>
</html>
