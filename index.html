<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>H5游戏 - 仪表盘示例</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>H5游戏</h1>
        <p>游戏内容区域</p>
        <div class="complete-counter" id="complete-counter">0</div>
        <div class="dashboard">
            <div class="dashboard-value">0</div>
        </div>
        <div class="touch-info">触摸位置: (0, 0)</div>
        <div class="touch-area"></div>
        <div class="touch-area-top"></div>
        <div class="touch-area-middle"></div>
        <div class="touch-area-bottom"></div>
        
        <!-- 数据显示区域 -->
        <div class="data-container">
            <div class="data-item">
                <div class="data-label">下</div>
                <div class="data-value" id="data-bottom">0</div>
            </div>
            <div class="data-item">
                <div class="data-label">中</div>
                <div class="data-value" id="data-middle">0</div>
            </div>
            <div class="data-item">
                <div class="data-label">上</div>
                <div class="data-value" id="data-top">0</div>
            </div>
        </div>
        
        <!-- 按钮区域 -->
        <div class="button-container">
            <div class="button-item">
                <button class="action-button" data-position="bottom">下</button>
                <div class="button-text" id="text-bottom"></div>
            </div>
            <div class="button-item">
                <button class="action-button" data-position="middle">中</button>
                <div class="button-text" id="text-middle"></div>
            </div>
            <div class="button-item">
                <button class="action-button" data-position="top">上</button>
                <div class="button-text" id="text-top"></div>
            </div>
        </div>
        <button class="clear-button" id="clear-btn">清除</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
