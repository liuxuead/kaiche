<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>H5游戏 - 仪表盘示例</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>H5游戏</h1>
        <p>游戏内容区域</p>
        <div class="dashboard">
            <div class="dashboard-value">00:00</div>
        </div>
        <div class="touch-info">触摸位置: (0, 0)</div>
        <div class="touch-area"></div>
        
        <!-- 数据显示区域 -->
        <div class="data-container">
            <div class="data-item">
                <div class="data-label">上</div>
                <div class="data-value" id="data-top">0</div>
            </div>
            <div class="data-item">
                <div class="data-label">中</div>
                <div class="data-value" id="data-middle">0</div>
            </div>
            <div class="data-item">
                <div class="data-label">下</div>
                <div class="data-value" id="data-bottom">0</div>
            </div>
        </div>
        
        <!-- 按钮区域 -->
        <div class="button-container">
            <button class="action-button" data-position="bottom">下</button>
            <button class="action-button" data-position="middle">中</button>
            <button class="action-button" data-position="top">上</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
